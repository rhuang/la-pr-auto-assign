# Sample team config.
#
# The real roster lives in a separate private repo passed to the action via
# the `config-repo` input. Copy this file there as `team.yml`, fill in the
# real values, and use a classic `repo`-scoped PAT for `load-token` that can
# read this repo, each repo listed in `load_repos`, and the current consumer repo.
#
# Top-level fields: verticals, load_repos, ignore_authors (optional).
# The candidate pool is derived as the union of all vertical reviewer lists —
# every reviewer must appear in at least one vertical.
#
# Algorithm tuning (num_reviewers, load_window_days, weights, fallback) is
# baked into the action — edit DEFAULT_ASSIGNMENT in src/config.ts and bump
# the tag to change it.
#
# Placeholder handles below — safe to keep in this public action repo.

verticals:
  Professional:
    reviewers:
      - placeholder-user-1
      - placeholder-user-2
  Client:
    reviewers:
      - placeholder-user-3
      - placeholder-user-4
  Designer:
    reviewers:
      - placeholder-user-3
      - placeholder-user-4

# PR authors in this list are opted out of auto-assignment — when they open a
# PR, the action logs and exits without requesting any reviewer. Match is
# case-insensitive. Optional; omit the field to disable.
ignore_authors:
  - dependabot[bot]
  - placeholder-bot-user

load_repos:
  # Each repo carries its own user list. The list does double duty:
  #  - eligibility: only listed users can be auto-assigned PRs in that repo
  #  - load-counting: only listed users have their load counted from that repo
  # Reviewers not listed for a repo are skipped entirely there. Use this to keep
  # FE-only reviewers off BE repos (and vice versa).
  - repo: owner/consumer-repo-a
    users:
      - placeholder-user-1
      - placeholder-user-2
      - placeholder-user-3
  - repo: owner/consumer-repo-b
    users:
      - placeholder-user-3
      - placeholder-user-4
